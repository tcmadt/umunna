name: Deploy Tree App

on:
  push:
    branches: [main]
    paths:
      - 'tree-app/**'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tree-app/package-lock.json

      - name: Install
        run: npm ci
        working-directory: tree-app

      - name: Build
        run: npm run build
        working-directory: tree-app

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: tree-app/dist
          destination_dir: tree-app/dist
          keep_files: true
