name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tree-app/package-lock.json

      - name: Install
        run: npm ci
        working-directory: tree-app

      - name: Build
        run: npm run build
        working-directory: tree-app

      # Assemble deploy folder:
      #   /           → landing page
      #   /tree/      → React tree app
      - name: Assemble deploy folder
        run: |
          mkdir -p deploy/tree
          cp index.html deploy/index.html
          cp -r tree-app/dist/. deploy/tree/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: deploy
          keep_files: false
